<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIV SRL — Fichas de Personal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --text: #e8eaf6;
    --muted: #8892b0;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --sidebar-w: 300px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  /* SIDEBAR */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #sidebar-header {
    padding: 18px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #sidebar-header .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
    margin-bottom: 12px;
  }
  #sidebar-header .logo span { color: var(--accent); }
  #search-box {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search-box:focus { border-color: var(--accent); }
  #search-box::placeholder { color: var(--muted); }
  
  #filter-bar {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  
  #stats-bar {
    padding: 6px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  #stats-bar span { color: var(--text); font-weight: 600; }
  
  #employee-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }
  #employee-list::-webkit-scrollbar { width: 4px; }
  #employee-list::-webkit-scrollbar-track { background: transparent; }
  #employee-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  
  .group-header {
    padding: 8px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .group-header .count {
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--muted);
  }
  
  .emp-item {
    padding: 9px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }
  .emp-item:hover { background: var(--surface2); }
  .emp-item.selected { background: var(--surface2); border-left-color: var(--accent); }
  .emp-item.inactive { opacity: 0.5; }
  
  .emp-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }
  .emp-avatar-placeholder {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
  }
  .emp-info { flex: 1; min-width: 0; }
  .emp-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .emp-sub { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .emp-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    flex-shrink: 0;
  }
  
  /* MAIN CONTENT */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    background: var(--bg);
  }
  #main::-webkit-scrollbar { width: 6px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    gap: 12px;
  }
  #welcome .icon { font-size: 48px; }
  #welcome h2 { color: var(--text); font-size: 20px; }
  #welcome p { font-size: 14px; }
  
  /* PROFILE CARD */
  #profile { display: none; }
  
  .profile-hero {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    padding: 32px 36px;
    display: flex;
    gap: 28px;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .profile-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--hero-color, var(--accent));
  }
  .profile-photo {
    width: 110px; height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--hero-color, var(--accent));
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .profile-photo-placeholder {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: var(--surface2);
    border: 3px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    color: var(--muted);
  }
  .profile-header-info { flex: 1; }
  .profile-local-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }
  .profile-name {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .profile-apellido {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    font-style: italic;
  }
  .profile-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-puesto { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
  .tag-cat { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
  .tag-senior { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
  .tag-horas { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .tag-inactive { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  
  .profile-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    padding: 18px 24px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat-item:last-child { border-right: none; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
  
  .profile-sections {
    padding: 24px 36px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .section.wide { grid-column: 1 / -1; }
  .section-title {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-body { padding: 14px 16px; }
  
  .field-row {
    display: flex;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid rgba(46,50,72,0.5);
    gap: 10px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label {
    font-size: 11px;
    color: var(--muted);
    min-width: 130px;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .field-value {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    word-break: break-word;
  }
  .field-value.empty { color: var(--muted); font-style: italic; font-size: 12px; }
  
  .no-results {
    text-align: center;
    padding: 30px 16px;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterList();
}

function getInitials(nombre) {
  return nombre.split(' ').filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('');
}

function filterList() {
  const q = document.getElementById('search-box').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  
  let filtered = EMPLOYEES.filter(e => {
    if (currentFilter === 'SI' && e.activo !== 'SI') return false;
    if (currentFilter === 'NO' && e.activo !== 'NO') return false;
    if (q) {
      const haystack = (e.nombre + ' ' + e.apellido_nombres + ' ' + e.puesto + ' ' + e.local)
        .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
  
  document.getElementById('count-display').textContent = filtered.length;
  
  const list = document.getElementById('employee-list');
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">Sin resultados</div>';
    return;
  }
  
  // Group by local
  const groups = {};
  LOCAL_ORDER.forEach(l => groups[l] = []);
  filtered.forEach(e => {
    if (!groups[e.local]) groups[e.local] = [];
    groups[e.local].push(e);
  });
  
  let html = '';
  LOCAL_ORDER.forEach(local => {
    const emps = groups[local];
    if (!emps || emps.length === 0) return;
    const icon = LOCAL_ICONS[local] || '';
    html += `<div class="group-header">${icon} ${local} <span class="count">${emps.length}</span></div>`;
    emps.forEach(e => {
      const isSelected = e.id === selectedId;
      const isInactive = e.activo !== 'SI';
      const avatarHtml = e.photo
        ? `<img class="emp-avatar" src="${e.photo}" alt="">`
        : `<div class="emp-avatar-placeholder" style="color:${e.local_color}">${getInitials(e.nombre)}</div>`;
      const badgeHtml = isInactive
        ? `<span class="emp-badge" style="background:rgba(239,68,68,0.15);color:#fca5a5">Inactivo</span>`
        : '';
      html += `<div class="emp-item${isSelected?' selected':''}${isInactive?' inactive':''}" onclick="showProfile('${e.id}')">
        ${avatarHtml}
        <div class="emp-info">
          <div class="emp-name">${e.nombre}</div>
          <div class="emp-sub">${e.puesto || e.apellido_nombres}</div>
        </div>
        ${badgeHtml}
      </div>`;
    });
  });
  
  list.innerHTML = html;
}

function showProfile(id) {
  selectedId = id;
  const e = EMPLOYEES.find(x => x.id === id);
  if (!e) return;
  
  // Re-render list to update selection
  filterList();
  
  const isInactive = e.activo !== 'SI';
  const color = e.local_color || '#3b82f6';
  const icon = LOCAL_ICONS[e.local] || '';
  
  // Photo
  const photoHtml = e.photo
    ? `<img class="profile-photo" src="${e.photo}" alt="" style="border-color:${color}">`
    : `<div class="profile-photo-placeholder">${getInitials(e.nombre)}</div>`;
  
  // Tags
  let tagsHtml = '';
  if (e.puesto) tagsHtml += `<span class="tag tag-puesto">${e.puesto}</span>`;
  if (e.categoria) tagsHtml += `<span class="tag tag-cat">Cat. ${e.categoria}</span>`;
  if (e.senioridad) tagsHtml += `<span class="tag tag-senior">${e.senioridad}</span>`;
  if (e.horas) tagsHtml += `<span class="tag tag-horas">${e.horas}h/sem</span>`;
  if (isInactive) tagsHtml += `<span class="tag tag-inactive">INACTIVO</span>`;
  
  // Stats
  const statsHtml = `
    <div class="profile-stats">
      <div class="stat-item">
        <div class="stat-value">${e.edad || '—'}</div>
        <div class="stat-label">Años de edad</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" style="font-size:14px">${e.antiguedad || '—'}</div>
        <div class="stat-label">Antigüedad en LIV</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" style="font-size:14px;color:${color}">${e.local}</div>
        <div class="stat-label">Local actual</div>
      </div>
    </div>`;
  
  // Helper for field rows
  function field(label, value) {
    const v = value ? `<span class="field-value">${value}</span>` : `<span class="field-value empty">—</span>`;
    return `<div class="field-row"><span class="field-label">${label}</span>${v}</div>`;
  }
  
  // Personal info section
  const personalHtml = `
    <div class="section">
      <div class="section-title">👤 Datos Personales</div>
      <div class="section-body">
        ${field('Apellido y Nombres', e.apellido_nombres)}
        ${field('Fecha de nacimiento', e.fecha_nac)}
        ${field('Edad', e.edad ? e.edad + ' años' : '')}
        ${field('CUIL', e.cuil)}
        ${field('Domicilio', e.domicilio || e.domicilio2)}
        ${field('Teléfono', e.telefono)}
        ${field('Email', e.email)}
        ${field('Obra Social', e.obra_social)}
      </div>
    </div>`;
  
  // Work info section
  const workHtml = `
    <div class="section">
      <div class="section-title">💼 Datos Laborales</div>
      <div class="section-body">
        ${field('Local actual', e.local_nombre)}
        ${field('Puesto', e.puesto)}
        ${field('Categoría', e.categoria)}
        ${field('Senioridad', e.senioridad)}
        ${field('Horas semanales', e.horas ? e.horas + 'h' : '')}
        ${field('Fecha ingreso LIV', e.fecha_entrada_liv || e.fecha_alta)}
        ${field('Antigüedad', e.antiguedad)}
        ${field('Puesto actual desde', e.fecha_puesto)}
        ${field('Fecha salida', e.fecha_salida || (isInactive ? 'Inactivo' : ''))}
        ${field('Locales LIV (exp.)', e.locales_exp)}
        ${field('Nro. Legajo', e.id)}
      </div>
    </div>`;
  
  // Extra info
  const extraHtml = `
    <div class="section">
      <div class="section-title">📋 Información Adicional</div>
      <div class="section-body">
        ${field('Exp. en el rubro', e.exp_rubro)}
        ${field('Hobbies / Intereses', e.hobbies)}
        ${field('Familia', e.familia)}
      </div>
    </div>`;
  
  // Emergency contact
  const emerHtml = `
    <div class="section">
      <div class="section-title">🚨 Contacto de Emergencia</div>
      <div class="section-body">
        ${field('Nombre', e.em_nombre)}
        ${field('Relación', e.em_relacion)}
        ${field('Teléfono', e.em_tel)}
      </div>
    </div>`;
  
  const profileContent = `
    <div style="--hero-color:${color}">
      <div class="profile-hero">
        ${photoHtml}
        <div class="profile-header-info">
          <div class="profile-local-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">
            ${icon} ${e.local_nombre}
          </div>
          <div class="profile-name">${e.nombre}</div>
          ${e.apellido_nombres !== e.nombre ? `<div class="profile-apellido">${e.apellido_nombres}</div>` : ''}
          <div class="profile-tags">${tagsHtml}</div>
        </div>
      </div>
      ${statsHtml}
      <div class="profile-sections">
        ${personalHtml}
        ${workHtml}
        ${extraHtml}
        ${emerHtml}
      </div>
    </div>`;
  
  document.getElementById('welcome').style.display = 'none';
  const prof = document.getElementById('profile');
  prof.style.display = 'block';
  prof.innerHTML = profileContent;
  
  // Scroll main to top
  document.getElementById('main').scrollTop = 0;
}

// Init
filterList();
</script>
</body>
</html>
